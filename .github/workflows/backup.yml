name: Backup Portfolio Data

on:
  # Every 3 days at 03:00 UTC
  schedule:
    - cron: '0 3 */3 * *'
  # Also allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Run backup
        env:
          VITE_TURSO_DATABASE_URL: ${{ secrets.VITE_TURSO_DATABASE_URL }}
          VITE_TURSO_AUTH_TOKEN: ${{ secrets.VITE_TURSO_AUTH_TOKEN }}
          BACKUP_GH_TOKEN: ${{ secrets.BACKUP_GH_TOKEN }}
          BACKUP_REPO: ${{ secrets.BACKUP_REPO }}
          BACKUP_BRANCH: ${{ secrets.BACKUP_BRANCH || 'main' }}
        run: node scripts/backup-to-github.cjs
